mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1

proxies:
  - name: amazon-biz
    type: vless
    server: {{SERVER_IP}}
    port: {{PROXY_PORT}}
    uuid: {{UUID}}
    network: tcp
    tls: true
    udp: true
    servername: www.amazon.com
    reality-opts:
      public-key: {{PUBLIC_KEY}}
      short-id: {{SHORT_ID}}
    client-fingerprint: chrome

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - amazon-biz
      - DIRECT

rules:
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
